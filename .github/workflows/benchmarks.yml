name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build packages
        run: pnpm build

      - name: Run benchmarks
        run: pnpm bench
        continue-on-error: true

      - name: Save benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            .benchmarks/latest.json
            .benchmarks/history/*.json
            .benchmarks/raw/*.log
            .benchmarks/comparisons/*.json
          if-no-files-found: ignore

      - name: Deploy benchmark data to public endpoint
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p .benchmarks/public
          cp .benchmarks/latest.json .benchmarks/public/latest.json 2>/dev/null || true
          cp .benchmarks/history/*.json .benchmarks/public/ 2>/dev/null || true
          echo "Benchmark data prepared for deployment"
